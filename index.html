<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvPro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header{
  background:#1e293b;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.container{
  padding:15px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input,button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  box-sizing:border-box;
}

input{
  background:#334155;
  color:white;
}

button{
  background:#3b82f6;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:.9;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #334155;
  padding:10px;
  text-align:center;
}

th{
  background:#334155;
}

.del{
  background:#ef4444;
}

.sell{
  background:#10b981;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.stat{
  background:#334155;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.stat h3{
  margin:0;
  font-size:14px;
  color:#94a3b8;
}

.stat p{
  margin:10px 0 0;
  font-size:20px;
  font-weight:bold;
}
</style>
</head>
<body>

<header>
📊 InvPro
</header>

<div class="container">

<div class="stats">
  <div class="stat">
    <h3>عدد المنتجات</h3>
    <p id="count">0</p>
  </div>

  <div class="stat">
    <h3>إجمالي الأرباح</h3>
    <p id="profit">0</p>
  </div>
</div>

<div class="card">
<h2>إضافة منتج</h2>

<input id="name" placeholder="اسم المنتج">
<input id="price" type="number" placeholder="السعر">
<input id="qty" type="number" placeholder="الكمية">

<button onclick="addProduct()">
➕ إضافة
</button>
</div>

<div class="card">
<h2>المنتجات</h2>

<table>
<thead>
<tr>
<th>المنتج</th>
<th>السعر</th>
<th>الكمية</th>
<th>الأرباح</th>
<th>بيع</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<script>
let products = JSON.parse(localStorage.getItem('products') || '[]');

function save(){
  localStorage.setItem('products', JSON.stringify(products));
}

function render(){
  const tbody = document.getElementById('tbody');

  tbody.innerHTML = '';

  let totalProfit = 0;

  products.forEach((p,index)=>{

    totalProfit += p.profit;

    tbody.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>${p.price}</td>
        <td>${p.qty}</td>
        <td>${p.profit}</td>

        <td>
          <button class="sell" onclick="sell(${index})">
            بيع
          </button>
        </td>

        <td>
          <button class="del" onclick="removeItem(${index})">
            حذف
          </button>
        </td>
      </tr>
    `;
  });

  document.getElementById('count').textContent = products.length;
  document.getElementById('profit').textContent = totalProfit;
}

function addProduct(){

  const name = document.getElementById('name').value;
  const price = parseFloat(document.getElementById('price').value);
  const qty = parseInt(document.getElementById('qty').value);

  if(!name || !price || !qty){
    alert('املأ جميع الحقول');
    return;
  }

  products.push({
    name,
    price,
    qty,
    profit:0
  });

  save();
  render();

  document.getElementById('name').value='';
  document.getElementById('price').value='';
  document.getElementById('qty').value='';
}

function sell(index){

  if(products[index].qty <= 0){
    alert('الكمية منتهية');
    return;
  }

  products[index].qty -= 1;
  products[index].profit += products[index].price;

  save();
  render();
}

function removeItem(index){

  if(confirm('حذف المنتج؟')){
    products.splice(index,1);
    save();
    render();
  }
}

render();
</script>

</body>
</html>
